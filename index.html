<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <section id="login-page" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-100 text-center">
            <img src="assets/github-logo.png" alt="GitHub Logo" class="w-20 h-20 mx-auto mb-4"> 
            <h1 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h1>
            <p class="text-gray-500 mb-8">Sign in to manage your issues</p>
            
            <form id="login-form" class="space-y-4 text-left">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" id="username" placeholder="Enter Username" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" required>
                    <p class="text-[10px] text-indigo-600 mt-1 uppercase font-bold">Default: admin</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" placeholder="Enter Password" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" required>
                    <p class="text-[10px] text-indigo-600 mt-1 uppercase font-bold">Default: admin123</p>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition">Sign In</button>
            </form>

            <div class="mt-8 pt-6 border-t border-gray-100">
                <p class="text-xs text-gray-400 uppercase tracking-widest mb-4">OR</p>
                <div class="bg-gray-50 p-4 rounded-lg">
                    <p class="text-sm text-gray-500">Demo Credentials:</p>
                    <p class="text-sm font-bold text-gray-700">User: admin | Pass: admin123</p>
                </div>
            </div>
        </div>
    </section>

    <section id="main-dashboard" class="hidden">
        <nav class="bg-white border-b border-gray-200 px-6 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <img src="assets/github-logo.png" alt="Logo" class="w-8 h-8">
                <span class="text-lg font-bold">GitHub Issues Tracker</span>
            </div>
            
            <div class="flex items-center gap-2 w-full md:w-auto">
                <div class="relative w-full md:w-64">
                    <input type="text" id="search-input" placeholder="Search issues..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md outline-none focus:ring-1 focus:ring-indigo-500">
                    <i class="fa fa-search absolute left-3 top-3 text-gray-400"></i>
                </div>
                <button class="bg-indigo-600 text-white px-4 py-2 rounded-md flex items-center gap-2">
                    <i class="fa fa-plus"></i> <span class="hidden sm:inline">New Issue</span>
                </button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-6">
            <div class="bg-white rounded-lg border border-gray-200 p-6 mb-6">
                <div class="flex gap-2 mb-6" id="tab-container">
                    <button onclick="filterIssues('all')" id="tab-all" class="tab-btn active-tab">All</button>
                    <button onclick="filterIssues('open')" id="tab-open" class="tab-btn">Open</button>
                    <button onclick="filterIssues('closed')" id="tab-closed" class="tab-btn">Closed</button>
                </div>
                
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <div class="p-3 bg-indigo-50 rounded-full">
                            <img src="assets/Aperture.png" alt="Stats Icon" class="w-6 h-6">
                        </div>
                        <div>
                            <h2 class="text-2xl font-bold" id="total-count">0 Issues</h2>
                            <p class="text-gray-400 text-sm">Track and manage your project issues</p>
                        </div>
                    </div>
                    <div class="hidden sm:flex gap-4 text-xs font-bold uppercase text-gray-500">
                        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-emerald-500"></span> Open</span>
                        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-purple-500"></span> Closed</span>
                    </div>
                </div>
            </div>

            <div id="loader" class="hidden flex justify-center py-20">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent"></div>
            </div>

            <div id="issues-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </main>
    </section>

    <div id="modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl max-w-lg w-full p-6 shadow-2xl relative">
            <div id="modal-body"></div>
            <button onclick="closeModal()" class="mt-6 w-full bg-indigo-600 text-white py-2 rounded-lg font-bold">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
